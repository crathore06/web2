<!DOCTYPE html>
<html lang="en">
    <head>
        <script type="text/javascript">
            // Hello
            // olleh
            var string = prompt("Please enter a string");
            var strLen = string.length;
            var revStr = '';
            for(var i = strLen-1;i>=0;i--){
                revStr += string[i];
            }
            console.log(`${string} reverse is ${revStr}`)
        </script>
    </head>
    <body></body>
</html>
