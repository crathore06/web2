<!DOCTYPE html>
<html lang="en">
    <head>
        <script type="text/javascript">
            var string = prompt("Please enter a string");
            console.log(string);
            var first = string.charAt(0);
            console.log(first);
            console.log(first.toUpperCase());        
            var rem = string.slice(1);
            console.log(rem);
            var caps = first.toUpperCase() + rem;
            console.log(`Final ${caps}`);
           
        </script>
    </head>
</html>
