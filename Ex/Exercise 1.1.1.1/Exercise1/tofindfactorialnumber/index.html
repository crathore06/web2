<!DOCTYPE html>
<html lang="en">
    <head>
        <title></title>
        <script type="text/javascript">
            var number = prompt("Please enter a number");
            var fact = 1;
            if(number == 0){
                console.log(`The fact of ${number} is 1`);
            }
            else if(number < 0){
                console.log(`The fact of -ive number is not possible`);
            }
            else{
                for(var i=1;i<=number;i++){
                    fact = fact * i;
                }
                console.log(`fact of ${number} is ${fact}`);
            }
        </script>
    </head>
    <body></body>
</html>
