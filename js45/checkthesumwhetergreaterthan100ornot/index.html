<!DOCTYPE html>
<html>
    <head>
        
    </head>
    <body>
        <p id="result"></p>
        <script>
            let num1=60;
            let num2=50;
            let sum=num1+num2;
            if (sum<100){
                document.getElementById("result").innerText="The sum is less than 100.";
            } else if(sum===100){           
                document.getElementById("result").innerText="The sum is exactly 100!";
            } else{          
                document.getElementById("result").innerText="The sum is greater than 100!";
            }
        </script>
    </body>
</html>
