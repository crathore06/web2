<!DOCTYPE html>
<html lang="en">
    <head>
        
    </head>
    <body>
        <h1>Addition using static input</h1>
        <p id="numbers"></p>
        <p id="result"></p>
        <button onclick="addStaticNumbers()">Calculate the Sum</button>      
        <script>
            function addStaticNumbers()
            {
                let number1 = 25;
                let number2 = 15;
                let sum = number1 + number2;
                document.getElementById("numbers").innerHTML=`The numbers are: ${number1} and ${number2}`;
                document.getElementById("result").innerHTML = `The sum is: ${sum}`;
            }
        </script>
    </body>
</html>
