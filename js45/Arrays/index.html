<!DOCTYPE html>
<html lang="en">
    <head>
    </head>
    <body>
        <h2>Arrays example in javascript</h2>
        <p id="ArrayOutput"></p>
        <script>
            let fruits=["Apples","Banana","Mango","Orange","Grapes"];
            let fruitlist = fruits.join("-----");
            document.getElementById("ArrayOutput").innerText="Available Fruits are: "+ fruitlist;
        </script>
    </body>
</html>
